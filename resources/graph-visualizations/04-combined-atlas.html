<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>European Critical Technology Atlas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07080e; overflow: hidden; font-family: 'Inter', -apple-system, system-ui, sans-serif; color: #e0e0e0; }
canvas { display: block; position: absolute; top: 0; left: 0; }

/* Top bar */
#topbar {
  position: absolute; top: 0; left: 0; right: 0; height: 56px;
  background: rgba(7,8,14,0.92); border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; padding: 0 24px; z-index: 10;
  backdrop-filter: blur(16px);
}
#topbar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; color: #fff; margin-right: 32px; }
.mode-toggle {
  display: flex; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 3px; margin-right: 24px;
}
.mode-btn {
  padding: 6px 16px; border-radius: 6px; border: none; background: none;
  color: #777; font-size: 12px; font-family: Inter, sans-serif; cursor: pointer;
  transition: all 0.25s; font-weight: 500;
}
.mode-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
.mode-btn:hover:not(.active) { color: #aaa; }

#search-box {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 7px 14px; color: #fff; font-size: 12px;
  font-family: Inter, sans-serif; outline: none; width: 180px; transition: all 0.2s;
}
#search-box:focus { border-color: rgba(255,255,255,0.2); width: 240px; }
#search-box::placeholder { color: #444; }

.sector-filters { display: flex; gap: 4px; margin-left: auto; }
.sector-chip {
  padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
  background: none; color: #666; font-size: 11px; font-family: Inter, sans-serif;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
}
.sector-chip.active { border-color: rgba(255,255,255,0.2); color: #ccc; }
.sector-chip:hover { border-color: rgba(255,255,255,0.15); color: #aaa; }

/* Detail panel */
#detail-panel {
  position: absolute; top: 56px; right: 0; width: 320px; height: calc(100vh - 56px);
  background: rgba(7,8,14,0.95); border-left: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(16px); transform: translateX(100%); transition: transform 0.35s ease;
  z-index: 10; overflow-y: auto; padding: 24px;
}
#detail-panel.open { transform: translateX(0); }
#detail-panel .close-btn {
  position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
  border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: none;
  color: #666; font-size: 16px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.2s;
}
#detail-panel .close-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.detail-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.detail-meta { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; opacity: 0.4; margin-bottom: 12px; }
.detail-desc { font-size: 13px; line-height: 1.6; opacity: 0.7; margin-bottom: 20px; }
.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; margin-bottom: 8px; }
.conn-item {
  display: flex; align-items: center; padding: 6px 10px; margin-bottom: 4px;
  background: rgba(255,255,255,0.03); border-radius: 6px; cursor: pointer;
  transition: background 0.2s;
}
.conn-item:hover { background: rgba(255,255,255,0.07); }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.conn-name { font-size: 12px; font-weight: 500; }
.conn-type { font-size: 10px; opacity: 0.4; margin-left: auto; }

/* Bottom legend */
#bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
  background: rgba(7,8,14,0.92); border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; padding: 0 24px; z-index: 10;
  backdrop-filter: blur(16px);
}
.legend-item { display: flex; align-items: center; margin-right: 20px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.legend-line { width: 20px; height: 2px; margin-right: 6px; border-radius: 1px; }
.legend-label { font-size: 10px; color: #666; }
#stats { margin-left: auto; font-size: 10px; color: #444; }

/* Tooltip */
#tooltip {
  position: absolute; display: none; padding: 10px 14px;
  background: rgba(7,8,14,0.95); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; font-size: 12px; pointer-events: none;
  backdrop-filter: blur(10px); z-index: 20; max-width: 220px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .tt-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
#tooltip .tt-sub { font-size: 10px; opacity: 0.5; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="topbar">
  <h1>Critical Tech Atlas</h1>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-explore" onclick="setMode('explore')">Explore</button>
    <button class="mode-btn" id="btn-supply" onclick="setMode('supply')">Supply Chain</button>
  </div>
  <input id="search-box" type="text" placeholder="Search..." oninput="onSearch(this.value)">
  <div class="sector-filters" id="sector-filters"></div>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">&times;</button>
  <div id="detail-content"></div>
</div>

<div id="bottom-bar">
  <div class="legend-item"><div class="legend-line" style="background:rgba(100,180,255,0.5)"></div><span class="legend-label">Technology</span></div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(255,180,60,0.5)"></div><span class="legend-label">Supply</span></div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(180,130,255,0.5)"></div><span class="legend-label">Portfolio</span></div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(255,80,80,0.4)"></div><span class="legend-label">Competes</span></div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(100,220,160,0.5)"></div><span class="legend-label">Ecosystem</span></div>
  <div id="stats">36 companies &middot; 6 sectors &middot; 48 relationships</div>
</div>

<div id="tooltip"></div>

<script>
// ============================================================
// DATA
// ============================================================
const SECTORS = {

  space:         { label: 'Space',         color: '#4ecdc4' },
  compute:       { label: 'Compute',       color: '#a78bfa' },

};

const LAYER_NAMES = ['Raw Materials','Components','Subsystems','Platforms','Integration'];
const LAYER_RADII = [0.14, 0.27, 0.40, 0.55, 0.70];

const EDGE_STYLES = {
  tech:      { color: 'rgba(100,180,255,', base: 0.18, hi: 0.65 },
  supply:    { color: 'rgba(255,180,60,',  base: 0.15, hi: 0.6  },
  portfolio: { color: 'rgba(180,130,255,', base: 0.25, hi: 0.7  },
  compete:   { color: 'rgba(255,80,80,',   base: 0.12, hi: 0.5  },
  ecosystem: { color: 'rgba(100,220,160,', base: 0.12, hi: 0.5  },
  intel:     { color: 'rgba(100,180,255,', base: 0.15, hi: 0.55 },
  design:    { color: 'rgba(100,180,255,', base: 0.15, hi: 0.55 },

const nodes = [
  { id:0,  name:'Vulcan Energy',    sector:'mining',   layer:0, sub:'Lithium',     desc:'Zero-carbon lithium extraction from geothermal brine. Karlsruhe.', portfolio:false },
  { id:1,  name:'Talga Group',      sector:'mining',   layer:0, sub:'Graphite',    desc:'Natural graphite anode materials. Sweden.', portfolio:false },
  { id:2,  name:'Horizon Arctic',   sector:'mining',   layer:0, sub:'Rare Earths', desc:'Arctic rare earth extraction and processing. Scandinavia.', portfolio:false },
  { id:3,  name:'Deep Earth',       sector:'mining',   layer:0, sub:'Intelligence',desc:'Subsurface AI for mineral exploration. Portfolio company.', portfolio:true },
  { id:4,  name:'Cornish Lithium',  sector:'mining',   layer:0, sub:'Lithium',     desc:'Geothermal lithium from Cornish granite. UK.', portfolio:false },
  { id:5,  name:'Northvolt',        sector:'energy',   layer:1, sub:'Batteries',   desc:'European battery gigafactory. Stockholm. $30B+ valuation.', portfolio:false },

  { id:10, name:'OQC',              sector:'compute',  layer:1, sub:'Quantum',     desc:'Superconducting quantum processors. London.', portfolio:false },
  { id:11, name:'Fabric',           sector:'compute',  layer:1, sub:'Crypto HW',   desc:'Cryptographic compute hardware. Portfolio company.', portfolio:true },
  { id:12, name:'Zeiss SMT',        sector:'manufacturing', layer:1, sub:'Optics',  desc:'EUV lithography optics. Sole supplier. Oberkochen.', portfolio:false },
  { id:13, name:'Trumpf',           sector:'manufacturing', layer:1, sub:'Lasers',  desc:'Industrial lasers + EUV light source. Ditzingen.', portfolio:false },
  { id:14, name:'ASML',             sector:'manufacturing', layer:2, sub:'Lithography', desc:'EUV lithography monopoly. Veldhoven. Controls advanced chipmaking.', portfolio:false },
  { id:15, name:'Mynaric',          sector:'defense',  layer:2, sub:'LaserCom',    desc:'Laser communication terminals for defense. Munich.', portfolio:false },
  { id:16, name:'Exotrail',         sector:'space',    layer:2, sub:'Propulsion',  desc:'Electric propulsion for small satellites. Paris.', portfolio:false },
  { id:17, name:'Hedy',             sector:'defense',  layer:2, sub:'Security',    desc:'Contested network security. Portfolio company.', portfolio:true },
  { id:18, name:'Tune Insight',     sector:'compute',  layer:2, sub:'Privacy',     desc:'Federated data analytics. Portfolio company.', portfolio:true },
  { id:19, name:'Cornami',          sector:'compute',  layer:2, sub:'FHE',         desc:'Fully homomorphic encryption acceleration. EU R&D.', portfolio:false },
  { id:20, name:'Ascend Elements',  sector:'mining',   layer:2, sub:'Recycling',   desc:'Closed-loop battery recycling. European operations.', portfolio:false },
  { id:21, name:'Helsing',          sector:'defense',  layer:3, sub:'Defense AI',  desc:'AI-powered defense decision systems. Munich. $5B+ valuation.', portfolio:false },
  { id:22, name:'Ark',              sector:'defense',  layer:3, sub:'Drones',      desc:'Autonomous drone fleet control. Portfolio company.', portfolio:true },
  { id:23, name:'Isar Aerospace',   sector:'space',    layer:3, sub:'Launch',      desc:'Small-satellite launch vehicles. Munich.', portfolio:false },
  { id:24, name:'Destinus',         sector:'space',    layer:3, sub:'Hypersonic',  desc:'Hydrogen-powered hypersonic aircraft. Payerne.', portfolio:false },
  { id:25, name:'Radical',          sector:'space',    layer:3, sub:'HAPS',        desc:'Stratospheric persistent platforms. Portfolio company.', portfolio:true },
  { id:26, name:'Newcleo',          sector:'energy',   layer:3, sub:'Nuclear',     desc:'Lead-cooled fast reactors with MOX fuel. London/Turin.', portfolio:false },
  { id:27, name:'Seaborg',          sector:'energy',   layer:3, sub:'Nuclear',     desc:'Compact molten salt reactor barges. Copenhagen.', portfolio:false },
  { id:28, name:'Rolls-Royce SMR',  sector:'energy',   layer:3, sub:'Nuclear',     desc:'Small modular reactors. UK government-backed.', portfolio:false },
  { id:29, name:'HENSOLDT',         sector:'defense',  layer:4, sub:'Sensors',     desc:'Defense sensor solutions. Taufkirchen. Publicly traded.', portfolio:false },
  { id:30, name:'Foundational',     sector:'space',    layer:4, sub:'SSA',         desc:'Space domain awareness and tracking. Portfolio company.', portfolio:true },
  { id:31, name:'Lodestar',         sector:'space',    layer:4, sub:'ISAM',        desc:'In-space assembly and manufacturing. Portfolio company.', portfolio:true },
  { id:32, name:'D-Orbit',          sector:'space',    layer:4, sub:'Logistics',   desc:'Space logistics and last-mile satellite delivery. Como.', portfolio:false },
  { id:33, name:'Blackshark.ai',    sector:'defense',  layer:4, sub:'3D Models',   desc:'AI-generated 3D world models for simulation. Graz.', portfolio:false },
  { id:34, name:'Preligens',        sector:'defense',  layer:4, sub:'GEOINT',      desc:'AI satellite imagery analysis for intelligence. Paris.', portfolio:false },
  { id:35, name:'Senken',           sector:'mining',   layer:4, sub:'Carbon MRV',  desc:'Carbon credit marketplace + MRV. Portfolio company.', portfolio:true },
];

const edges = [
  { s:0,  t:5,  type:'supply' },   { s:1,  t:5,  type:'supply' },
  { s:4,  t:5,  type:'supply' },   { s:2,  t:8,  type:'supply' },
  { s:3,  t:0,  type:'intel' },    { s:3,  t:2,  type:'intel' },
  { s:12, t:14, type:'supply' },   { s:13, t:14, type:'supply' },
  { s:13, t:15, type:'tech' },     { s:8,  t:14, type:'design' },
  { s:6,  t:17, type:'tech' },     { s:7,  t:17, type:'tech' },
  { s:11, t:19, type:'tech' },     { s:11, t:18, type:'tech' },
  { s:9,  t:19, type:'tech' },     { s:10, t:19, type:'tech' },
  { s:5,  t:20, type:'supply' },   { s:15, t:22, type:'supply' },
  { s:15, t:25, type:'supply' },   { s:16, t:23, type:'supply' },
  { s:16, t:31, type:'supply' },   { s:17, t:21, type:'tech' },
  { s:17, t:22, type:'tech' },     { s:14, t:8,  type:'equip' },
  { s:14, t:7,  type:'equip' },    { s:18, t:21, type:'tech' },
  { s:20, t:5,  type:'recycle' },  { s:21, t:29, type:'supply' },
  { s:21, t:33, type:'tech' },     { s:21, t:34, type:'tech' },
  { s:22, t:29, type:'supply' },   { s:22, t:30, type:'tech' },
  { s:23, t:30, type:'supply' },   { s:23, t:32, type:'supply' },
  { s:25, t:30, type:'tech' },     { s:25, t:35, type:'tech' },
  { s:24, t:32, type:'tech' },     { s:26, t:28, type:'compete' },
  { s:27, t:28, type:'compete' },  { s:3,  t:35, type:'intel' },
  { s:11, t:21, type:'tech' },     { s:7,  t:22, type:'tech' },
  // Portfolio links
  { s:10, t:11, type:'portfolio' }, { s:17, t:11, type:'portfolio' },
  { s:22, t:17, type:'portfolio' }, { s:30, t:14, type:'portfolio' },
  { s:25, t:22, type:'portfolio' }, { s:3,  t:25, type:'portfolio' },
  { s:31, t:16, type:'portfolio' }, { s:18, t:7,  type:'portfolio' },
];

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const ctx_ = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx_.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); computeTargets(); });

// ============================================================
// STATE
// ============================================================
let mode = 'explore'; // 'explore' | 'supply'
let activeSectors = new Set(Object.keys(SECTORS));
let searchTerm = '';
let hoveredNode = null;
let selectedNode = null;
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let cam = { x: 0, y: 0, zoom: 1 };
let panning = false, panStart = { x:0, y:0 };
let time = 0;
let morphProgress = 0; // 0 = explore, 1 = supply

// Initialize node positions
nodes.forEach(n => {
  n.x = W/2 + (Math.random()-0.5)*500;
  n.y = H/2 + (Math.random()-0.5)*400;
  n.tx = n.x; n.ty = n.y; // targets
  n.vx = 0; n.vy = 0;
  n.color = SECTORS[n.sector].color;
  n.size = n.portfolio ? 9 : (7 + n.layer * 0.8);
  n.visible = true;
  n.alpha = 1;
});

// Particles
let particles = [];
edges.forEach(e => {
  for (let i = 0; i < 2; i++) {
    particles.push({ edge: e, t: Math.random(), speed: 0.002 + Math.random()*0.003, size: 1 + Math.random() });
  }
});

// Stars
const stars = Array.from({length:150}, () => ({
  x: Math.random()*3000-500, y: Math.random()*2000-300, r: Math.random()*1, a: Math.random()*0.4
}));

// ============================================================
// BUILD UI
// ============================================================
const filtersEl = document.getElementById('sector-filters');
const allChip = document.createElement('button');
allChip.className = 'sector-chip active';
allChip.textContent = 'All';
allChip.onclick = () => toggleAllSectors();
filtersEl.appendChild(allChip);

Object.entries(SECTORS).forEach(([key, s]) => {
  const chip = document.createElement('button');
  chip.className = 'sector-chip active';
  chip.textContent = s.label;
  chip.dataset.sector = key;
  chip.style.borderColor = s.color + '40';
  chip.onclick = () => toggleSector(key, chip);
  filtersEl.appendChild(chip);
});

function toggleAllSectors() {
  const all = activeSectors.size === Object.keys(SECTORS).length;
  if (all) return;
  activeSectors = new Set(Object.keys(SECTORS));
  document.querySelectorAll('.sector-chip').forEach(c => c.classList.add('active'));
  updateVisibility();
}

function toggleSector(key, chip) {
  if (activeSectors.has(key)) { activeSectors.delete(key); chip.classList.remove('active'); }
  else { activeSectors.add(key); chip.classList.add('active'); }
  // Update "All" chip
  allChip.classList.toggle('active', activeSectors.size === Object.keys(SECTORS).length);
  updateVisibility();
}

function updateVisibility() {
  nodes.forEach(n => {
    const sectorOk = activeSectors.has(n.sector);
    const searchOk = !searchTerm || n.name.toLowerCase().includes(searchTerm);
    n.visible = sectorOk && searchOk;
  });
}

function onSearch(val) {
  searchTerm = val.toLowerCase().trim();
  updateVisibility();
  // Auto-select if exact match
  if (searchTerm.length > 2) {
    const match = nodes.find(n => n.name.toLowerCase().includes(searchTerm) && n.visible);
    if (match) { selectedNode = match; openDetail(match); }
  } else {
    selectedNode = null; closeDetail();
  }
}

// ============================================================
// LAYOUT TARGETS
// ============================================================
function computeTargets() {
  const cx = W/2, cy = (H-56)/2 + 56; // offset for topbar
  const minDim = Math.min(W, H-100);

  if (mode === 'supply') {
    // Radial concentric
    for (let layer = 0; layer < 5; layer++) {
      const layerNodes = nodes.filter(n => n.layer === layer);
      const r = LAYER_RADII[layer] * minDim * 0.52;
      layerNodes.forEach((n, i) => {
        const angle = (i / layerNodes.length) * Math.PI * 2 - Math.PI/2;
        n.tx = cx + Math.cos(angle) * r;
        n.ty = cy + Math.sin(angle) * r;
      });
    }
  }
  // Explore mode uses force simulation - targets not needed
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-explore').classList.toggle('active', m === 'explore');
  document.getElementById('btn-supply').classList.toggle('active', m === 'supply');
  if (m === 'supply') computeTargets();
}

computeTargets();

// ============================================================
// FORCE SIMULATION (explore mode)
// ============================================================
function simulate() {
  if (mode === 'supply') {
    // Morph toward targets
    morphProgress = Math.min(1, morphProgress + 0.04);
    nodes.forEach(n => {
      if (dragging === n) return;
      n.x += (n.tx - n.x) * 0.08;
      n.y += (n.ty - n.y) * 0.08;
      n.vx = 0; n.vy = 0;
    });
    return;
  }

  morphProgress = Math.max(0, morphProgress - 0.04);
  const cx = W/2, cy = (H-56)/2 + 56;

  nodes.forEach(n => {
    if (!n.visible || dragging === n) return;
    // Center gravity
    n.vx += (cx - n.x) * 0.00008;
    n.vy += (cy - n.y) * 0.00008;
  });

  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    if (!nodes[i].visible) continue;
    for (let j = i+1; j < nodes.length; j++) {
      if (!nodes[j].visible) continue;
      let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      let d2 = dx*dx + dy*dy;
      if (d2 < 1) d2 = 1;
      if (d2 > 250000) continue;
      const f = 600 / d2;
      const dist = Math.sqrt(d2);
      const fx = dx/dist*f, fy = dy/dist*f;
      if (dragging !== nodes[i]) { nodes[i].vx -= fx; nodes[i].vy -= fy; }
      if (dragging !== nodes[j]) { nodes[j].vx += fx; nodes[j].vy += fy; }
    }
  }

  // Edge attraction
  edges.forEach(e => {
    const a = nodes[e.s], b = nodes[e.t];
    if (!a.visible || !b.visible) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 1) return;
    const f = (d - 100) * 0.002;
    const fx = dx/d*f, fy = dy/d*f;
    if (dragging !== a) { a.vx += fx; a.vy += fy; }
    if (dragging !== b) { b.vx -= fx; b.vy -= fy; }
  });

  // Cluster by sector (gentle)
  const sectorCenters = {};
  Object.keys(SECTORS).forEach((s, i) => {
    const angle = (i / Object.keys(SECTORS).length) * Math.PI * 2;
    sectorCenters[s] = { x: cx + Math.cos(angle)*120, y: cy + Math.sin(angle)*120 };
  });
  nodes.forEach(n => {
    if (!n.visible || dragging === n) return;
    const sc = sectorCenters[n.sector];
    n.vx += (sc.x - n.x) * 0.0003;
    n.vy += (sc.y - n.y) * 0.0003;
  });

  // Damping & update
  nodes.forEach(n => {
    if (!n.visible || dragging === n) return;
    n.vx *= 0.88; n.vy *= 0.88;
    n.x += n.vx; n.y += n.vy;
    // Keep in bounds
    n.x = Math.max(80, Math.min(W-80, n.x));
    n.y = Math.max(80, Math.min(H-80, n.y));
  });
}

// ============================================================
// INTERACTION
// ============================================================
function screenToWorld(sx, sy) {
  return { x: (sx - W/2)/cam.zoom + cam.x + W/2, y: (sy - H/2)/cam.zoom + cam.y + H/2 };
}
function worldToScreen(wx, wy) {
  return { x: (wx - cam.x - W/2)*cam.zoom + W/2, y: (wy - cam.y - H/2)*cam.zoom + H/2 };
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.zoom = Math.max(0.4, Math.min(4, cam.zoom * (e.deltaY > 0 ? 0.93 : 1.07)));
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  if (e.clientY < 56) return;
  const wp = screenToWorld(e.clientX, e.clientY);
  for (const n of nodes) {
    if (!n.visible) continue;
    const sp = worldToScreen(n.x, n.y);
    const dx = e.clientX - sp.x, dy = e.clientY - sp.y;
    const hitR = (n.size + 6) * cam.zoom;
    if (dx*dx + dy*dy < hitR*hitR) {
      dragging = n;
      dragOffset = { x: wp.x - n.x, y: wp.y - n.y };
      return;
    }
  }
  panning = true; panStart = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    const wp = screenToWorld(e.clientX, e.clientY);
    dragging.x = wp.x - dragOffset.x;
    dragging.y = wp.y - dragOffset.y;
    if (mode === 'supply') { dragging.tx = dragging.x; dragging.ty = dragging.y; }
  } else if (panning) {
    cam.x -= (e.clientX - panStart.x) / cam.zoom;
    cam.y -= (e.clientY - panStart.y) / cam.zoom;
    panStart = { x: e.clientX, y: e.clientY };
  } else {
    hoveredNode = null;
    for (const n of nodes) {
      if (!n.visible) continue;
      const sp = worldToScreen(n.x, n.y);
      const dx = e.clientX - sp.x, dy = e.clientY - sp.y;
      const hitR = (n.size + 6) * cam.zoom;
      if (dx*dx + dy*dy < hitR*hitR) { hoveredNode = n; break; }
    }
    if (hoveredNode) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
      tooltip.innerHTML = `<div class="tt-name" style="color:${hoveredNode.color}">${hoveredNode.name}</div>
        <div class="tt-sub">${SECTORS[hoveredNode.sector].label} &middot; ${hoveredNode.sub} &middot; ${LAYER_NAMES[hoveredNode.layer]}</div>`;
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = 'default';
    }
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragging && !panning) {
    // Click = select
    selectedNode = dragging;
    openDetail(dragging);
  }
  dragging = null;
  if (panning) panning = false;
});

canvas.addEventListener('dblclick', e => {
  const wp = screenToWorld(e.clientX, e.clientY);
  for (const n of nodes) {
    if (!n.visible) continue;
    const sp = worldToScreen(n.x, n.y);
    const dx = e.clientX - sp.x, dy = e.clientY - sp.y;
    if (dx*dx + dy*dy < (n.size+6)*(n.size+6)*cam.zoom*cam.zoom) {
      selectedNode = n;
      openDetail(n);
      return;
    }
  }
});

// ============================================================
// DETAIL PANEL
// ============================================================
function openDetail(n) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const connEdges = edges.filter(e => e.s === n.id || e.t === n.id);
  const upstream = connEdges.filter(e => e.t === n.id).map(e => ({ node: nodes[e.s], type: e.type }));
  const downstream = connEdges.filter(e => e.s === n.id).map(e => ({ node: nodes[e.t], type: e.type }));

  let html = `<div class="detail-name" style="color:${n.color}">${n.name}</div>
    <div class="detail-meta">${SECTORS[n.sector].label} &middot; ${n.sub} &middot; ${LAYER_NAMES[n.layer]}${n.portfolio ? ' &middot; Portfolio' : ''}</div>
    <div class="detail-desc">${n.desc}</div>`;

  if (upstream.length) {
    html += `<div class="detail-section"><h4>Upstream Dependencies (${upstream.length})</h4>`;
    upstream.forEach(c => {
      html += `<div class="conn-item" onclick="focusNode(${c.node.id})">
        <div class="conn-dot" style="background:${c.node.color}"></div>
        <span class="conn-name">${c.node.name}</span>
        <span class="conn-type">${c.type}</span></div>`;
    });
    html += `</div>`;
  }

  if (downstream.length) {
    html += `<div class="detail-section"><h4>Downstream Dependents (${downstream.length})</h4>`;
    downstream.forEach(c => {
      html += `<div class="conn-item" onclick="focusNode(${c.node.id})">
        <div class="conn-dot" style="background:${c.node.color}"></div>
        <span class="conn-name">${c.node.name}</span>
        <span class="conn-type">${c.type}</span></div>`;
    });
    html += `</div>`;
  }

  // Supply chain path
  const chainUp = traceChain(n.id, 'up');
  const chainDown = traceChain(n.id, 'down');
  if (chainUp.length > 1 || chainDown.length > 1) {
    html += `<div class="detail-section"><h4>Full Supply Chain Path</h4>
      <div style="font-size:11px;opacity:0.6;line-height:1.8">`;
    const fullChain = [...chainUp.reverse().slice(0,-1), n.id, ...chainDown.slice(1)];
    fullChain.forEach((id, i) => {
      const cn = nodes[id];
      const isCurrent = id === n.id;
      html += `<span style="color:${isCurrent ? cn.color : '#888'};font-weight:${isCurrent ? '600' : '400'}">${cn.name}</span>`;
      if (i < fullChain.length - 1) html += ` <span style="opacity:0.3">&rarr;</span> `;
    });
    html += `</div></div>`;
  }

  content.innerHTML = html;
  panel.classList.add('open');
}

function traceChain(nodeId, direction, visited = new Set()) {
  visited.add(nodeId);
  const chain = [nodeId];
  const relevant = direction === 'up'
    ? edges.filter(e => e.t === nodeId && (e.type === 'supply' || e.type === 'equip') && !visited.has(e.s))
    : edges.filter(e => e.s === nodeId && (e.type === 'supply' || e.type === 'equip') && !visited.has(e.t));

  if (relevant.length > 0) {
    const nextId = direction === 'up' ? relevant[0].s : relevant[0].t;
    chain.push(...traceChain(nextId, direction, visited));
  }
  return chain;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedNode = null;
}

function focusNode(id) {
  const n = nodes[id];
  selectedNode = n;
  cam.x = n.x - W/2;
  cam.y = n.y - H/2;
  openDetail(n);
}

// ============================================================
// RENDER
// ============================================================
function draw() {
  time += 0.016;
  simulate();
  ctx_.clearRect(0, 0, W, H);

  const cx = W/2, cy = (H-56)/2 + 56;

  // Stars
  stars.forEach(s => {
    const sp = worldToScreen(s.x, s.y);
    ctx_.globalAlpha = s.a * (0.2 + Math.sin(time + s.x)*0.1);
    ctx_.fillStyle = '#fff';
    ctx_.beginPath(); ctx_.arc(sp.x, sp.y, s.r, 0, Math.PI*2); ctx_.fill();
  });
  ctx_.globalAlpha = 1;

  // Supply chain rings (visible when in supply mode or morphing)
  if (morphProgress > 0) {
    const minDim = Math.min(W, H-100);
    ctx_.save();
    for (let i = 0; i < 5; i++) {
      const r = LAYER_RADII[i] * minDim * 0.52 * cam.zoom;
      const center = worldToScreen(cx, cy);
      ctx_.globalAlpha = morphProgress * 0.06;
      ctx_.strokeStyle = '#ffffff';
      ctx_.lineWidth = 1;
      ctx_.setLineDash([4, 8]);
      ctx_.beginPath(); ctx_.arc(center.x, center.y, r, 0, Math.PI*2); ctx_.stroke();
      // Label
      ctx_.setLineDash([]);
      ctx_.globalAlpha = morphProgress * 0.15;
      ctx_.fillStyle = '#fff';
      ctx_.font = '9px Inter, sans-serif';
      ctx_.textAlign = 'left';
      ctx_.fillText(LAYER_NAMES[i].toUpperCase(), center.x + r + 8, center.y - 4);
    }
    ctx_.restore();
  }

  // Determine highlight set
  const focusN = selectedNode || hoveredNode;
  let hlSet = null;
  if (focusN) {
    hlSet = new Set([focusN.id]);
    edges.forEach(e => {
      if (e.s === focusN.id) hlSet.add(e.t);
      if (e.t === focusN.id) hlSet.add(e.s);
    });
  }

  // Edges
  edges.forEach(e => {
    const a = nodes[e.s], b = nodes[e.t];
    if (!a.visible || !b.visible) return;
    const sa = worldToScreen(a.x, a.y), sb = worldToScreen(b.x, b.y);
    const isHl = focusN && (e.s === focusN.id || e.t === focusN.id);
    const dimmed = focusN && !isHl;
    const style = EDGE_STYLES[e.type] || EDGE_STYLES.tech;

    // Curved edges in supply mode
    let cpx, cpy;
    if (morphProgress > 0.1) {
      const center = worldToScreen(cx, cy);
      const midX = (sa.x + sb.x)/2, midY = (sa.y + sb.y)/2;
      const pull = morphProgress * 0.2;
      cpx = midX + (midX - center.x) * pull;
      cpy = midY + (midY - center.y) * pull;
    }

    ctx_.globalAlpha = dimmed ? 0.02 : 1;
    ctx_.strokeStyle = style.color + (isHl ? style.hi : style.base) + ')';
    ctx_.lineWidth = isHl ? 2.5 : 0.8;
    ctx_.beginPath();
    ctx_.moveTo(sa.x, sa.y);
    if (cpx !== undefined) ctx_.quadraticCurveTo(cpx, cpy, sb.x, sb.y);
    else ctx_.lineTo(sb.x, sb.y);
    ctx_.stroke();
  });

  // Particles
  particles.forEach(p => {
    const a = nodes[p.edge.s], b = nodes[p.edge.t];
    if (!a.visible || !b.visible) return;
    const isHl = focusN && (p.edge.s === focusN.id || p.edge.t === focusN.id);
    if (focusN && !isHl) return;

    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const sa = worldToScreen(a.x, a.y), sb = worldToScreen(b.x, b.y);

    let px, py;
    if (morphProgress > 0.1) {
      const center = worldToScreen(cx, cy);
      const midX = (sa.x+sb.x)/2, midY = (sa.y+sb.y)/2;
      const pull = morphProgress * 0.2;
      const cpx = midX + (midX-center.x)*pull, cpy = midY + (midY-center.y)*pull;
      const t = p.t, mt = 1-t;
      px = mt*mt*sa.x + 2*mt*t*cpx + t*t*sb.x;
      py = mt*mt*sa.y + 2*mt*t*cpy + t*t*sb.y;
    } else {
      px = sa.x + (sb.x-sa.x)*p.t;
      py = sa.y + (sb.y-sa.y)*p.t;
    }

    ctx_.globalAlpha = isHl ? 0.9 : 0.25;
    ctx_.fillStyle = '#fff';
    ctx_.beginPath(); ctx_.arc(px, py, isHl ? p.size*1.5 : p.size, 0, Math.PI*2); ctx_.fill();
  });
  ctx_.globalAlpha = 1;

  // Nodes
  nodes.forEach(n => {
    if (!n.visible) return;
    const sp = worldToScreen(n.x, n.y);
    const r = n.size * cam.zoom;
    const isFocus = focusN && focusN.id === n.id;
    const inHl = hlSet ? hlSet.has(n.id) : true;
    const dimmed = hlSet && !inHl;

    // Glow
    if (!dimmed) {
      const glow = ctx_.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, r*3.5);
      glow.addColorStop(0, n.color + (isFocus ? '45' : '18'));
      glow.addColorStop(1, 'transparent');
      ctx_.fillStyle = glow;
      ctx_.beginPath(); ctx_.arc(sp.x, sp.y, r*3.5, 0, Math.PI*2); ctx_.fill();
    }

    ctx_.globalAlpha = dimmed ? 0.08 : 1;

    // Portfolio ring
    if (n.portfolio && !dimmed) {
      ctx_.strokeStyle = n.color;
      ctx_.lineWidth = 1.5 * cam.zoom;
      ctx_.globalAlpha = dimmed ? 0.05 : 0.4;
      ctx_.beginPath(); ctx_.arc(sp.x, sp.y, r + 4*cam.zoom, 0, Math.PI*2); ctx_.stroke();
      ctx_.globalAlpha = dimmed ? 0.08 : 1;
    }

    // Body
    ctx_.fillStyle = n.color;
    ctx_.shadowColor = n.color;
    ctx_.shadowBlur = isFocus ? 18 : 6;
    ctx_.beginPath(); ctx_.arc(sp.x, sp.y, r, 0, Math.PI*2); ctx_.fill();
    ctx_.shadowBlur = 0;

    // Focus pulse
    if (isFocus) {
      ctx_.strokeStyle = n.color;
      ctx_.lineWidth = 1.5;
      const pulse = r + 6*cam.zoom + Math.sin(time*3)*3;
      ctx_.globalAlpha = 0.3 + Math.sin(time*3)*0.2;
      ctx_.beginPath(); ctx_.arc(sp.x, sp.y, pulse, 0, Math.PI*2); ctx_.stroke();
      ctx_.globalAlpha = 1;
    }

    // Label
    const showLabel = !dimmed && (isFocus || inHl || cam.zoom > 0.7);
    if (showLabel) {
      ctx_.globalAlpha = dimmed ? 0.04 : (isFocus ? 1 : 0.65);
      ctx_.fillStyle = '#fff';
      ctx_.font = `${isFocus ? 12*cam.zoom : 10*cam.zoom}px Inter, -apple-system, sans-serif`;
      ctx_.textAlign = 'center';
      ctx_.fillText(n.name, sp.x, sp.y + r + 12*cam.zoom);
    }
    ctx_.globalAlpha = 1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
