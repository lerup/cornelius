<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">

  <!-- Background -->
  <rect width="1440" height="810" fill="#FFFFFF"/>

  <!-- ============================================================ -->
  <!-- FUND CARDS                                                    -->
  <!-- ============================================================ -->

  <!-- Pilot card bottom border -->
  <line x1="72" y1="192" x2="692" y2="192" stroke="#000000" stroke-width="2"/>

  <!-- Pilot fund name -->
  <text x="72" y="62" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#000000" letter-spacing="0.5">Pilot (Fund I)</text>

  <!-- Pilot meta -->
  <text x="72" y="86" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#000000">$1.1M</text>
  <text x="72" y="99" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">FUND SIZE</text>
  <text x="142" y="86" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#000000">2019</text>
  <text x="142" y="99" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">VINTAGE</text>

  <!-- Pilot metrics -->
  <text x="72" y="140" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#000000" letter-spacing="-1">8.0x</text>
  <text x="72" y="155" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">TVPI</text>
  <text x="162" y="140" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#000000" letter-spacing="-1">3.0x</text>
  <text x="162" y="155" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">DPI</text>

  <!-- Pilot note -->
  <text x="72" y="174" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#999999">Selection engine validated. 5 of 12 positions drove returns.</text>

  <!-- Mercury card bottom border -->
  <line x1="748" y1="192" x2="1368" y2="192" stroke="#7A8A7D" stroke-width="2"/>

  <!-- Mercury fund name -->
  <text x="748" y="62" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#7A8A7D" letter-spacing="0.5">Mercury (Fund II)</text>

  <!-- Mercury meta -->
  <text x="748" y="86" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4A5A4D">$40M</text>
  <text x="748" y="99" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">FUND SIZE</text>
  <text x="812" y="86" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4A5A4D">2022</text>
  <text x="812" y="99" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">VINTAGE</text>

  <!-- Mercury metrics -->
  <text x="748" y="140" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#7A8A7D" letter-spacing="-1">0.95x</text>
  <text x="748" y="155" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">TVPI</text>
  <text x="870" y="140" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#7A8A7D" letter-spacing="-1">0.0x</text>
  <text x="870" y="155" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#999999" letter-spacing="0.5">DPI</text>

  <!-- Mercury note -->
  <text x="748" y="174" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#999999">Most conservative markups. No SAFE uplifts. The slope matters, not the snapshot.</text>

  <!-- ============================================================ -->
  <!-- J-CURVE CHART                                                 -->
  <!-- Nested SVG preserves chart coordinate system                  -->
  <!-- ============================================================ -->
  <svg x="72" y="218" width="1296" height="345" viewBox="0 0 1280 340" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="pilot-area" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#000000" stop-opacity="0.06"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="mercury-proj-fade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#7A8A7D" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#7A8A7D" stop-opacity="0.1"/>
      </linearGradient>
      <linearGradient id="pilot-proj-fade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
      </linearGradient>
    </defs>

    <!-- Horizontal grid lines (every 3x) -->
    <line x1="70" y1="278" x2="1220" y2="278" stroke="#F0F0F0" stroke-width="0.75"/>
    <line x1="70" y1="211" x2="1220" y2="211" stroke="#F0F0F0" stroke-width="0.75"/>
    <line x1="70" y1="144" x2="1220" y2="144" stroke="#F0F0F0" stroke-width="0.75"/>
    <line x1="70" y1="77"  x2="1220" y2="77"  stroke="#F0F0F0" stroke-width="0.75"/>
    <line x1="70" y1="10"  x2="1220" y2="10"  stroke="#F0F0F0" stroke-width="0.75"/>

    <!-- 1.0x reference line (dashed) -->
    <line x1="70" y1="255" x2="1220" y2="255" stroke="#D5D5D5" stroke-width="0.75" stroke-dasharray="5,3"/>

    <!-- Y-axis labels -->
    <text x="58" y="282" font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">0x</text>
    <text x="58" y="259" font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">1x</text>
    <text x="58" y="215" font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">3x</text>
    <text x="58" y="148" font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">6x</text>
    <text x="58" y="81"  font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">9x</text>
    <text x="58" y="14"  font-size="10" fill="#C0C0C0" text-anchor="end" font-family="Inter, sans-serif">12x</text>

    <!-- X-axis labels (0 to 12) -->
    <text x="70"   y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">0</text>
    <text x="166"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">1</text>
    <text x="262"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">2</text>
    <text x="358"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">3</text>
    <text x="453"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">4</text>
    <text x="549"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">5</text>
    <text x="645"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">6</text>
    <text x="741"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">7</text>
    <text x="837"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">8</text>
    <text x="932"  y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">9</text>
    <text x="1028" y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">10</text>
    <text x="1124" y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">11</text>
    <text x="1220" y="320" font-size="10" fill="#C0C0C0" text-anchor="middle" font-family="Inter, sans-serif">12</text>
    <text x="645" y="336" font-size="9" fill="#D0D0D0" text-anchor="middle" font-family="Inter, sans-serif" letter-spacing="1.5">YEARS SINCE FIRST CLOSE</text>

    <!-- PILOT: Area fill -->
    <path d="M 70,255
             C 100,258 135,262 166,263
             C 195,264 230,268 262,268
             C 295,268 325,266 358,264
             C 390,260 420,254 453,249
             C 485,238 515,226 549,211
             C 580,192 613,170 645,155
             C 678,136 710,115 741,99
             L 741,300 L 70,300 Z"
          fill="url(#pilot-area)"/>

    <!-- PILOT: Solid line -->
    <path d="M 70,255
             C 100,258 135,262 166,263
             C 195,264 230,268 262,268
             C 295,268 325,266 358,264
             C 390,260 420,254 453,249
             C 485,238 515,226 549,211
             C 580,192 613,170 645,155
             C 678,136 710,115 741,99"
          fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>

    <!-- PILOT: Projected (years 7-12) -->
    <path d="M 741,99 C 850,55 1000,28 1220,10"
          fill="none" stroke="url(#pilot-proj-fade)" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>

    <!-- PILOT: DPI marker at year 7: 3.0x -->
    <line x1="741" y1="99" x2="741" y2="211" stroke="#000000" stroke-width="1" stroke-dasharray="2,3" opacity="0.25"/>
    <circle cx="741" cy="211" r="3.5" fill="#FFFFFF" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
    <text x="755" y="215" font-size="10" fill="#808080" font-family="Inter, sans-serif" font-weight="500">3.0x DPI</text>

    <!-- PILOT: TVPI dot at year 7 -->
    <circle cx="741" cy="99" r="5" fill="#000000"/>
    <circle cx="741" cy="99" r="9" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.25"/>

    <!-- PILOT: Label -->
    <text x="755" y="89" font-size="12" fill="#000000" font-family="Inter, sans-serif" font-weight="700">Pilot</text>
    <text x="755" y="103" font-size="10" fill="#808080" font-family="Inter, sans-serif">8.0x TVPI</text>

    <!-- MERCURY: Solid line -->
    <path d="M 70,255
             C 100,256 135,258 166,259
             C 195,260 230,263 262,264
             C 295,265 325,265 358,265
             C 390,264 420,260 453,257"
          fill="none" stroke="#7A8A7D" stroke-width="2.5" stroke-linecap="round"/>

    <!-- MERCURY: Current dot at year 4 -->
    <circle cx="453" cy="257" r="5" fill="#7A8A7D"/>
    <circle cx="453" cy="257" r="9" fill="none" stroke="#7A8A7D" stroke-width="1.5" opacity="0.25"/>

    <!-- MERCURY: Step-up arrow -->
    <line x1="453" y1="255" x2="453" y2="240" stroke="#7A8A7D" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
    <polygon points="449,242 453,234 457,242" fill="#7A8A7D" opacity="0.6"/>
    <text x="466" y="237" font-size="9" fill="#7A8A7D" font-family="Inter, sans-serif" font-weight="500" opacity="0.8">incl. pending</text>
    <text x="466" y="247" font-size="9" fill="#7A8A7D" font-family="Inter, sans-serif" font-weight="500" opacity="0.8">markups</text>

    <!-- MERCURY: Projected trajectory -->
    <path d="M 453,238
             C 550,218 650,192 741,171
             C 850,140 1000,108 1220,81"
          fill="none" stroke="url(#mercury-proj-fade)" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>

    <!-- MERCURY: Label -->
    <text x="466" y="268" font-size="12" fill="#7A8A7D" font-family="Inter, sans-serif" font-weight="700">Mercury</text>
    <text x="466" y="280" font-size="10" fill="#9AA99D" font-family="Inter, sans-serif">0.95x TVPI</text>

    <!-- Phase annotations -->
    <text x="200" y="295" font-size="9" fill="#D5D5D5" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic">deployment</text>
    <text x="700" y="40" font-size="9" fill="#D5D5D5" text-anchor="middle" font-family="Inter, sans-serif" font-style="italic">value creation</text>
  </svg>

  <!-- ============================================================ -->
  <!-- PENDING MARKUPS                                               -->
  <!-- ============================================================ -->

  <!-- Separator line -->
  <line x1="72" y1="580" x2="1368" y2="580" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Title -->
  <text x="72" y="608" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000" letter-spacing="-0.2">The slope behind 0.95x - markups <tspan fill="#7A8A7D" font-weight="700">not yet reflected</tspan> in TVPI (and more coming in 2026)</text>

  <!-- Column 1: Hedy -->
  <line x1="72" y1="626" x2="72" y2="680" stroke="#7A8A7D" stroke-width="2"/>
  <text x="86" y="640" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000">Hedy</text>
  <text x="86" y="655" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#808080">$9.8M <tspan fill="#7A8A7D">-></tspan> $40M</text>
  <text x="86" y="675" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7A8A7D">4.1x</text>

  <!-- Column 2: Ark -->
  <line x1="331" y1="626" x2="331" y2="680" stroke="#E0E0E0" stroke-width="2"/>
  <text x="345" y="640" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000">Ark</text>
  <text x="345" y="655" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#808080">$21.5M <tspan fill="#7A8A7D">-></tspan> $65M</text>
  <text x="345" y="675" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7A8A7D">3.0x</text>

  <!-- Column 3: Hanseatic -->
  <line x1="590" y1="626" x2="590" y2="680" stroke="#E0E0E0" stroke-width="2"/>
  <text x="604" y="640" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000">Hanseatic</text>
  <text x="604" y="655" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#808080">$25M <tspan fill="#7A8A7D">-></tspan> $60M</text>
  <text x="604" y="675" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7A8A7D">2.4x</text>

  <!-- Column 4: NAD -->
  <line x1="850" y1="626" x2="850" y2="680" stroke="#E0E0E0" stroke-width="2"/>
  <text x="864" y="640" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000">NAD</text>
  <text x="864" y="655" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#808080">$25M <tspan fill="#7A8A7D">-></tspan> $56M+</text>
  <text x="864" y="675" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7A8A7D">2.2x</text>

  <!-- Column 5: Foundational -->
  <line x1="1109" y1="626" x2="1109" y2="680" stroke="#E0E0E0" stroke-width="2"/>
  <text x="1123" y="640" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#000000">Foundational</text>
  <text x="1123" y="655" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#808080">$17M <tspan fill="#7A8A7D">-></tspan> $25M</text>
  <text x="1123" y="675" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7A8A7D">1.5x</text>

  <!-- ============================================================ -->
  <!-- FOOTER                                                        -->
  <!-- ============================================================ -->

  <!-- Footer separator -->
  <line x1="72" y1="710" x2="1368" y2="710" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Footer logo -->
  <text x="72" y="736" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#000000" letter-spacing="-0.5">inflection<tspan fill="#808080" font-weight="700">&#169;</tspan></text>

  <!-- Footer right -->
  <text x="1230" y="736" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="end" font-style="italic" letter-spacing="0.5">Past performance does not guarantee future results.</text>
  <text x="1368" y="736" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#808080" text-anchor="end" letter-spacing="0.5">CONFIDENTIAL</text>

</svg>
